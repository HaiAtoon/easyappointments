name: Deploy to GCP VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to targets
        run: |
          while IFS= read -r target; do
            [ -z "$target" ] && continue
            [[ "$target" =~ ^# ]] && continue
            echo "Deploying to /var/www/html/$target ..."
            rsync -rlvz --delete \
              --exclude='/config.php' \
              --exclude='storage/' \
              --exclude='.git/' \
              --exclude='.github/' \
              --exclude='CLAUDE.md' \
              --exclude='deploy-targets.txt' \
              -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
              ./ ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/var/www/html/$target/

            # Sync storage structure files without --delete (preserve runtime data)
            rsync -rlvz \
              --include='*/' \
              --include='.htaccess' \
              --include='index.html' \
              --exclude='*' \
              -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
              ./storage/ ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/var/www/html/$target/storage/

            echo "Done: $target"
          done < deploy-targets.txt

      - name: Restart Apache
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} \
            "sudo systemctl restart apache2"
